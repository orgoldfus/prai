name: Release

on:
  push:
    branches: [master]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    name: Build & Release (Apple Silicon)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release

      - name: Determine version
        id: version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          SHORT_SHA=$(git rev-parse --short HEAD)
          TAG="v${VERSION}-${SHORT_SHA}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Package binary
        run: |
          mkdir -p dist
          cp target/release/prai dist/
          tar -czf "dist/prai-${{ steps.version.outputs.tag }}-aarch64-apple-darwin.tar.gz" -C dist prai

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: prai ${{ steps.version.outputs.tag }}
          body: |
            Release built from `${{ github.sha }}` on the `master` branch.

            **Platform:** macOS Apple Silicon (aarch64-apple-darwin)
          files: dist/prai-*.tar.gz
          make_latest: true
